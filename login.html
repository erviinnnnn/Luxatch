<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OMNILUXE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            height: 100vh;
            background: url('xxx.png') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 400px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            text-align: center;
        }
        .btn-dark {
            background-color: #000000;
            border: none;
        }
        .btn-dark:hover {
            background-color: #333333;
        }
        .form-control {
            border-radius: 6px;
        }
        a {
            color: #000000;
            font-weight: bold;
        }
        a:hover {
            color: #333333;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="mb-3">LOGIN</h2>
        <p>Please enter your e-mail and password:</p>
        <form id="loginForm">
            <input type="email" class="form-control mb-3" placeholder="E-mail" required>
            <input type="password" class="form-control mb-3" placeholder="Password" required>
            <button type="submit" class="btn btn-dark w-100">LOGIN</button>
        </form>
        <div class="mt-3">
            <a href="#">Forgot password?</a> | <a href="register.html">Create an account</a>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            $('#loginForm').submit(function (event) {
                event.preventDefault();
                window.location.href = 'product.html';
            });
        });
    </script>
</body>
</html>
