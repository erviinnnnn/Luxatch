<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-4">
        <a href="javascript:history.back()" class="btn btn-secondary mb-3">&#8592; Kembali</a>
        <h1 class="mb-4 text-dark"><i class="bi bi-cart"></i> Checkout</h1>

        <div id="cartContainer" class="mb-3"></div>

        <div class="card p-3">
            <h4>Total: Rp<span id="totalPrice">0</span></h4>
        </div>

        <div class="card p-3 mt-3 d-flex flex-row justify-content-between align-items-center">
            <span>Subtotal: <span id="subtotal-price" class="fw-bold">Rp0</span></span>
            <button id="checkout-btn" class="btn btn-dark">Checkout</button>
        </div>

        <div id="payment-details" class="card p-3 mt-3 d-none">
            <h2>Detail Pembayaran</h2>
            <p>Total Harga: <span id="final-price" class="fw-bold">Rp0</span></p>
            <p>Silakan transfer ke rekening berikut:</p>
            <p class="fw-bold">BANK BCA: 123-456-7890 (Atas Nama: Luxatch)</p>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            const cartContainer = $("#cartContainer");
            const totalPriceElement = $("#totalPrice");
            const subtotalPriceElement = $("#subtotal-price");
            const checkoutButton = $("#checkout-btn");
            const paymentDetails = $("#payment-details");
            const finalPriceElement = $("#final-price");

            function loadCart() {
                cartContainer.empty();
                let cartData = JSON.parse(localStorage.getItem("cartData")) || {};
                let total = 0;

                $.each(cartData, function (key, product) {
                    total += product.price * product.quantity;
                    let cartItem = $(`
                        <div class="d-flex align-items-center bg-dark text-white p-3 mb-2 rounded">
                            <input type="checkbox" class="form-check-input me-2 item-checkbox" data-price="${product.price * product.quantity}">
                            <img src="${product.image}" class="me-3 rounded" width="60" height="60">
                            <div class="flex-grow-1">${product.name} x ${product.quantity} - Rp${product.price.toLocaleString()}</div>
                            <button class="btn btn-danger btn-sm remove-btn" data-id="${key}">Hapus</button>
                        </div>
                    `);
                    cartContainer.append(cartItem);
                });

                totalPriceElement.text(total.toLocaleString("id-ID"));
            }

            function updateSubtotal() {
                let subtotal = 0;
                $(".item-checkbox:checked").each(function () {
                    subtotal += parseInt($(this).data("price"));
                });
                subtotalPriceElement.text(`Rp${subtotal.toLocaleString("id-ID")}`);
            }

            $(document).on("click", ".remove-btn", function () {
                let productId = $(this).data("id");
                let cartData = JSON.parse(localStorage.getItem("cartData")) || {};
                delete cartData[productId];
                localStorage.setItem("cartData", JSON.stringify(cartData));
                loadCart();
            });

            $(document).on("change", ".item-checkbox", function () {
                updateSubtotal();
            });

            checkoutButton.click(function () {
                let total = 0;
                $(".item-checkbox:checked").each(function () {
                    total += parseInt($(this).data("price"));
                });

                if (total > 0) {
                    finalPriceElement.text(`Rp${total.toLocaleString("id-ID")}`);
                    paymentDetails.hide().removeClass("d-none").fadeIn(500);
                } else {
                    alert("Pilih minimal satu produk untuk checkout.");
                }
            });

            loadCart();
        });
    </script>
</body>
</html>
