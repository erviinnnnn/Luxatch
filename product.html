<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Watch Store</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/card.css">
    <link rel="stylesheet" href="./css/popup.css">
    <link rel="stylesheet" href="./css/cart.css">
      <!-- Icon dari Ion Icons -->
    <script type="module" src="https://unpkg.com/ionicons@5.4.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule="" src="https://unpkg.com/ionicons@5.4.0/dist/ionicons/ionicons.js"></script>

</head>

<body>

    <header>
        <div class="logo">Luxatch</div>
        <nav>
            <ul>
                <li><a href="./Jam.html">Home</a></li>
                <li><a href="/product.html">Collection</a></li>
                <li><a href="./checkout.html">Checkout</a></li>
            </ul>
        </nav>
        <div class="icons">
            <a href="login.html" class="account-icon">👤</a>

            <div class="shopping"> 
                <a id="cart">
                  <ion-icon class="icon-nav cart-icon" name="cart-outline"></ion-icon>
                  <span class="quantity">0</span>
                </a> 
              </div>

        </div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    </header>


    <section class="hero">
        <h1>Koleksi Terbaik Kami</h1>
        <p>Desain Elegan & Kualitas Terbaik</p>
    </section>


 

<section class="product-frame">
    <div class="container-ass">
    </div>
</section>

    <footer>
        <p>&copy; 2025 E-Commerce Watch Store. All rights reserved.</p>
    </footer>

<!-- Modal -->
<div id="productModal" class="modal">
    <div class="product-card2">
        <span class="close">&times;</span>
        <section class="product-page">
            <div class="product-container">
                <div id="thumbnail-container" class="thumbnail-container"></div>

                <!-- Gambar utama -->
                <div class="product-image">
                    <img id="modalImage" src="" alt="Jam Tangan">
                </div>

                <!-- Detail Produk -->
                <div class="product-details">
                    <h1 id="modalTitle"></h1>
                    <p class="price"><span class="old-price">Rp1.439.000</span> <span class="discount">-48%</span></p>
                    <p id="modalPrice" class="new-price"></p>
                     <!-- Input Jumlah -->
                    <div class="quantity-selector">
                    <input type="number" value="1" min="1">
                    </div>
                    <!-- Tombol Beli -->
                    <div class="buttons">
                        <button class="buy-now" id="addToCartButton">Add to Cart</button>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<div class="card">
    <h1>Shopping Cart</h1>
    <ul class="listCard">
    </ul>
    <div class="checkOut">
      <div class="total">0</div>
      <div class="closeShopping">Close</div>
    </div>
</div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./javascript/product_data.js"></script>
</body>
</html>
